<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Jquery Local</title>
    
    <link rel="stylesheet" href="css/jquery-ui.css">
    
    <script src="js/jquery-3.5.0.js"></script>
    <script src="js/jquery-ui.js"></script>
</head>
<body>

    <h2>Ejemplo de Uso de jQuery y jQueryUI</h2>
    
    <div id="accordion">
        <h3>Sección 1: Datos</h3>
        <div>
            <p id="nombreCarrera">Ingeniería en Tecnologías de la Información</p>
            <p id="nombreUniversidad">UTPL</p>
            <button type="button" id="btnGenerar">Generar Mensaje</button>
        </div>

        <h3>Sección 2: Resultado</h3>
        <div>
            <p id="mensajeFinal">Aquí aparecerá el mensaje...</p>
        </div>

        <h3>Sección 3: Copia 1</h3>
        <div>
            <p id="mensajeFinal2"></p>
        </div>

        <h3>Sección 4: Copia 2</h3>
        <div>
            <p id="mensajeFinal3"></p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Inicializar acordeón
            $("#accordion").accordion({
                collapsible: true,
                heightStyle: "content"
            });

            // Función del botón
            $("#btnGenerar").click(function() {
                var texto1 = $('#nombreCarrera').text();
                var texto2 = $('#nombreUniversidad').text();
                var mensaje = "Su carrera es: " + texto1 + ". Su universidad es " + texto2;
                
                $('#mensajeFinal, #mensajeFinal2, #mensajeFinal3').text(mensaje);
                console.log("Botón presionado. Carrera: " + texto1);
            });
        });
    </script>

</body>
</html>
